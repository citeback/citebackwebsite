<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Citeback</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .code {
      font-size: clamp(72px, 15vw, 120px);
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #e63946;
      line-height: 1;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }
    p {
      color: #94a3b8;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      background: #e63946;
      color: #fff;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist or was moved. The fight against surveillance continues on the home page.</p>
    <a href="/">Back to Citeback</a>
  </div>
</body>
</html>
