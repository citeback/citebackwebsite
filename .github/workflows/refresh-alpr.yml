name: Refresh ALPR Camera Data

on:
  schedule:
    # Every Sunday at 3:00 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch ALPR data from OSM
        run: python3 scripts/fetch-alpr.py

      - name: Commit updated data
        run: |
          git config user.name "deflect-bot"
          git config user.email "deflect-bot@users.noreply.github.com"
          git add public/alpr-us.json
          git diff --staged --quiet || git commit -m "chore: refresh ALPR camera data $(date -u '+%Y-%m-%d')"
          git push
