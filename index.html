<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Citeback — Fight Mass Surveillance Legally</title>
    <meta name="description" content="Citeback is a decentralized platform funding legal resistance to ALPR mass surveillance. Fund billboards, lawsuits, and FOIA campaigns anonymously with Monero." />
    <meta name="keywords" content="ALPR, Flock Safety, license plate reader, surveillance, privacy, Fourth Amendment, Monero, anonymous, decentralized" />

    <!-- Open Graph -->
    <meta property="og:title" content="Citeback — We Cite Back" />
    <meta property="og:description" content="Decentralized funding for legal resistance to mass surveillance. Billboards. Lawsuits. FOIA. Powered by Monero." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://citeback.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Citeback — We Cite Back" />
    <meta name="twitter:description" content="Decentralized funding for legal resistance to ALPR mass surveillance." />

    <!-- No tracking ever -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <!-- Netlify Forms detection -->
    <form name="camera-submission" netlify netlify-honeypot="bot-field" hidden>
      <input name="lat" /><input name="lng" />
      <input name="location" /><input name="notes" /><input name="source" />
    </form>
    <form name="campaign-proposal" netlify netlify-honeypot="bot-field" hidden>
      <input name="type" /><input name="title" /><input name="location" />
      <textarea name="description"></textarea>
      <input name="goal" /><input name="contact" />
    </form>
    <form name="registry-application" netlify netlify-honeypot="bot-field" hidden>
      <input name="role" /><input name="location" />
      <textarea name="background"></textarea><input name="contact" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
