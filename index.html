<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#e63946" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Citeback" />
    <!-- Fonts self-hosted in /fonts/ — no external requests -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Citeback — Fund the Fight Against Surveillance</title>
    <meta name="description" content="Anonymous crowdfunding for surveillance lawsuits, FOIA requests, and ordinance campaigns. Funded in Monero (XMR) and Zano. No account, no contributor identity, no credit card. Support Fourth Amendment challenges to Flock Safety ALPR and license plate surveillance." />
    <meta name="keywords" content="ALPR, Flock Safety, Flock Safety lawsuit, license plate reader, license plate reader privacy, ALPR ban, surveillance resistance, surveillance accountability, Fourth Amendment, Fourth Amendment crowdfunding, Monero, XMR, ZANO, anonymous, decentralized, crowdfunding, FOIA, ShotSpotter, predictive policing, facial recognition" />
    <link rel="canonical" href="https://citeback.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Citeback — Fund the Fight Against Surveillance" />
    <meta property="og:description" content="Anonymous crowdfunding for surveillance lawsuits, FOIA requests, and ordinance campaigns. Funded with Monero (XMR) and Zano privacy cryptocurrency. No account. No contributor identity collected." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://citeback.com" />
    <meta property="og:image" content="https://citeback.com/og-image.png" />
    <meta property="og:site_name" content="Citeback" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Citeback — Fund the Fight Against Surveillance" />
    <meta name="twitter:description" content="Anonymous crowdfunding for surveillance lawsuits, FOIA requests, and ordinance campaigns. Funded with Monero (XMR) and Zano privacy cryptocurrency. No account. No contributor identity collected." />
    <meta name="twitter:image" content="https://citeback.com/og-image.png" />
    <meta name="twitter:site" content="@citeback" />

    <!-- No tracking ever -->
    <meta name="robots" content="index, follow" />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Citeback",
      "url": "https://citeback.com",
      "description": "Anonymous crowdfunding platform for surveillance resistance — funding lawsuits, FOIA requests, and ordinance campaigns against ALPR license plate readers, facial recognition, and mass surveillance systems.",
      "sameAs": ["https://github.com/citeback/citebackwebsite"],
      "foundingDate": "2026",
      "areaServed": "US",
      "knowsAbout": ["surveillance resistance", "ALPR cameras", "Fourth Amendment", "Monero", "FOIA requests", "privacy rights"],
      "funding": {
        "@type": "Grant",
        "description": "Community-funded through Monero (XMR) and Zano (ZANO) cryptocurrency donations"
      }
    }
    </script>
  </head>
  <body style="background:#fafaf8;color:#1a1a1a;">
    <!-- Netlify Forms detection -->
    <form name="camera-submission" netlify netlify-honeypot="bot-field" hidden>
      <input name="lat" /><input name="lng" />
      <input name="location" /><input name="notes" /><input name="source" />
    </form>
    <form name="campaign-proposal" netlify netlify-honeypot="bot-field" hidden>
      <input name="type" /><input name="title" /><input name="location" />
      <textarea name="description"></textarea>
      <input name="goal" /><input name="contact" />
    </form>
    <form name="registry-application" netlify netlify-honeypot="bot-field" hidden>
      <input name="role" /><input name="location" />
      <textarea name="background"></textarea><input name="contact" />
    </form>
    <form name="waitlist" netlify netlify-honeypot="bot-field" hidden>
      <input name="email" type="email" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
