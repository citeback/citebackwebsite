<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Citeback — Fund the Fight Against Surveillance</title>
    <meta name="description" content="Anonymous crowdfunding for surveillance lawsuits, FOIA requests, and ordinance campaigns. Paid in XMR + ZANO. No account. No donor identity collected. Protocol-level donation privacy." />
    <meta name="keywords" content="ALPR, Flock Safety, license plate reader, surveillance, privacy, Fourth Amendment, Monero, XMR, ZANO, anonymous, decentralized, crowdfunding" />
    <link rel="canonical" href="https://citeback.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Citeback — Fund the Fight Against Surveillance" />
    <meta property="og:description" content="Anonymous crowdfunding for surveillance lawsuits, FOIA requests, and ordinance campaigns. Paid in XMR + ZANO. No account. No donor identity collected. Protocol-level donation privacy." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://citeback.com" />
    <meta property="og:image" content="https://citeback.com/og-image.png" />
    <meta property="og:site_name" content="Citeback" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Citeback — Fund the Fight Against Surveillance" />
    <meta name="twitter:description" content="Anonymous crowdfunding for surveillance lawsuits, FOIA requests, and ordinance campaigns. Paid in XMR + ZANO. No account. No donor identity collected. Protocol-level donation privacy." />
    <meta name="twitter:image" content="https://citeback.com/og-image.png" />
    <meta name="twitter:site" content="@citeback" />

    <!-- No tracking ever -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <!-- Netlify Forms detection -->
    <form name="camera-submission" netlify netlify-honeypot="bot-field" hidden>
      <input name="lat" /><input name="lng" />
      <input name="location" /><input name="notes" /><input name="source" />
    </form>
    <form name="campaign-proposal" netlify netlify-honeypot="bot-field" hidden>
      <input name="type" /><input name="title" /><input name="location" />
      <textarea name="description"></textarea>
      <input name="goal" /><input name="contact" />
    </form>
    <form name="registry-application" netlify netlify-honeypot="bot-field" hidden>
      <input name="role" /><input name="location" />
      <textarea name="background"></textarea><input name="contact" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
